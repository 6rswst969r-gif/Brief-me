name: Update News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch RSS feeds and NDR audio
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import re

          def fetch_rss(url, source_name, is_reddit=False):
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (compatible; briefing-bot/1.0)'})
              with urllib.request.urlopen(req, timeout=15) as r:
                xml_data = r.read().decode('utf-8', errors='replace')
              root = ET.fromstring(xml_data)

              if is_reddit:
                ns = {'atom': 'http://www.w3.org/2005/Atom', 'media': 'http://search.yahoo.com/mrss/'}
                entries = root.findall('atom:entry', ns)[:5]
                items = []
                for entry in entries:
                  title = entry.findtext('atom:title', namespaces=ns) or ''
                  link_el = entry.find('atom:link', ns)
                  link = link_el.get('href', '') if link_el is not None else ''
                  content = entry.findtext('atom:content', namespaces=ns) or ''
                  img_match = re.search(r'<img[^>]+src=["\']([^"\']+)["\']', content)
                  thumb = img_match.group(1) if img_match else ''
                  if thumb and ('icon' in thumb.lower() or 'emoji' in thumb.lower()):
                    thumb = ''
                  if title:
                    items.append({'title': title.strip(), 'link': link.strip(), 'thumb': thumb, 'desc': ''})
                return items
              else:
                items = []
                for item in root.findall('.//item')[:5]:
                  title = item.findtext('title') or ''
                  link = item.findtext('link') or ''
                  desc = item.findtext('description') or ''
                  desc = re.sub(r'<[^>]+>', '', desc).strip()[:150]
                  if title:
                    items.append({'title': title.strip(), 'link': link.strip(), 'desc': desc})
                return items
            except Exception as e:
              print(f"Error fetching {source_name}: {e}")
              return []

          def fetch_ndr_audio(url):
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (compatible; briefing-bot/1.0)'})
              with urllib.request.urlopen(req, timeout=15) as r:
                xml_data = r.read().decode('utf-8', errors='replace')
              root = ET.fromstring(xml_data)
              item = root.find('.//item')
              if item is None:
                return {}
              title = item.findtext('title') or ''
              pub_date = item.findtext('pubDate') or ''
              enclosure = item.find('enclosure')
              audio_url = enclosure.get('url', '') if enclosure is not None else ''
              duration = item.findtext('{http://www.itunes.com/dtds/podcast-1.0.dtd}duration') or ''
              return {
                'title': title.strip(),
                'pub_date': pub_date.strip(),
                'audio_url': audio_url.strip(),
                'duration': duration.strip()
              }
            except Exception as e:
              print(f"Error fetching NDR audio: {e}")
              return {}

          news = {
            'tagesschau': fetch_rss('https://www.tagesschau.de/xml/rss2/', 'Tagesschau'),
            'taz': fetch_rss('https://taz.de/!p4608;rss/', 'taz'),
            'reddit': fetch_rss('https://www.reddit.com/user/alxbeirut/m/bike/.rss', 'Reddit', is_reddit=True),
            'ndr_audio': fetch_ndr_audio('https://www.ndr.de/nachrichten/info/podcast4370.xml')
          }

          with open('news.json', 'w', encoding='utf-8') as f:
            json.dump(news, f, ensure_ascii=False, indent=2)

          print(f"Tagesschau: {len(news['tagesschau'])} Artikel")
          print(f"taz: {len(news['taz'])} Artikel")
          print(f"Reddit: {len(news['reddit'])} Posts")
          print(f"NDR Audio: {news['ndr_audio'].get('title', 'nicht gefunden')}")
          PYEOF

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update news $(date -u '+%Y-%m-%d %H:%M')"
          git push
