<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morgen-Briefing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --accent: #007aff;
    --text: #1c1c1e;
    --text2: rgba(60,60,67,0.6);
    --text3: rgba(60,60,67,0.3);
    --border: rgba(255,255,255,0.55);
    --border-inner: rgba(0,0,0,0.06);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(255,200,220,0.55) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, rgba(255,180,210,0.35) 0%, transparent 45%),
      radial-gradient(ellipse at 55% 80%, rgba(255,220,235,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 5% 85%, rgba(255,240,245,0.4) 0%, transparent 45%),
      linear-gradient(160deg, #fff5f8 0%, #ffe8f0 40%, #fff0f5 100%);
    background-attachment: fixed;
  }

  /* HEADER */
  .header {
    background: rgba(255,255,255,0.38);
    backdrop-filter: saturate(220%) blur(32px);
    -webkit-backdrop-filter: saturate(220%) blur(32px);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 4px 24px rgba(0,0,0,0.03);
    padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left {}
  #clock { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
  #datestr { font-size: 13px; color: var(--text2); margin-top: 2px; }
  #location { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 14px; }

  /* GLASS CARD */
  .card {
    background: rgba(255,255,255,0.45);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 0 rgba(255,255,255,0.6) inset, 0 8px 32px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    overflow: hidden;
  }
  .card-header { padding: 14px 18px 0; display: flex; justify-content: space-between; align-items: center; }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); }
  .card-meta { font-size: 12px; color: var(--text3); }

  /* TOP ROW */
  .top-row { display: grid; grid-template-columns: 1fr 1.6fr; gap: 14px; }

  /* AUDIO */
  .audio-wrap { padding: 16px 18px 18px; display: flex; align-items: center; gap: 14px; }
  .play-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(0,122,255,0.82);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 2px 0 rgba(255,255,255,0.3) inset, 0 4px 16px rgba(0,122,255,0.4), 0 1px 4px rgba(0,0,0,0.08);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.3) inset, 0 6px 24px rgba(0,122,255,0.55), 0 1px 4px rgba(0,0,0,0.08); }
  .play-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }
  .play-btn.playing svg { margin-left: 0; }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .audio-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.08); border-radius: 4px; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.4); }
  .progress-fill { height: 100%; background: rgba(0,122,255,0.8); border-radius: 4px; width: 0%; pointer-events: none; }
  .progress-handle { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; border-radius: 50%; background: var(--accent); left: 0%; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 1px 4px rgba(0,122,255,0.4); }
  .progress-bar:hover .progress-handle, .progress-bar:active .progress-handle { opacity: 1; }
  .audio-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* WEATHER */
  .weather-main { padding: 16px 18px; display: flex; gap: 16px; align-items: flex-start; }
  .weather-icon { font-size: 52px; line-height: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08)); }
  .weather-temp { font-size: 48px; font-weight: 300; letter-spacing: -2px; line-height: 1; }
  .weather-desc { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .weather-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: rgba(0,0,0,0.05); border-top: 1px solid rgba(255,255,255,0.5); }
  .weather-stat { background: rgba(255,255,255,0.3); backdrop-filter: blur(8px); padding: 12px 14px; transition: background 0.2s; }
  .weather-stat:hover { background: rgba(255,255,255,0.5); }
  .weather-stat-label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .weather-stat-value { font-size: 16px; font-weight: 600; }
  .weather-stat-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

  /* NEWS ROW */
  .news-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* TICKER */
  .ticker-section { border-top: 1px solid rgba(255,255,255,0.45); }
  .ticker-section:first-child { border-top: none; }
  .ticker-label { padding: 8px 18px 0; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
  .ticker-outer {
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 10px 0;
    position: relative;
    cursor: grab;
    background: rgba(255,255,255,0.15);
  }
  .ticker-outer:active { cursor: grabbing; }
  .ticker-outer::-webkit-scrollbar { display: none; }
  .ticker-outer::before, .ticker-outer::after { content:''; position:absolute; top:0; bottom:0; width:36px; z-index:2; pointer-events:none; }
  .ticker-outer::before { left:0; background: linear-gradient(to right, rgba(255,255,255,0.45), transparent); }
  .ticker-outer::after { right:0; background: linear-gradient(to left, rgba(255,255,255,0.45), transparent); }
  .ticker-track { display:flex; animation: ticker-scroll 50s linear infinite; white-space: nowrap; width: max-content; }
  .ticker-track.paused { animation-play-state: paused; }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item { display:inline-flex; align-items:center; gap:10px; padding:0 20px; text-decoration:none; color:var(--text); }
  .ticker-source { font-size:10px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0; }
  .ticker-title { font-size:13px; font-weight:400; }
  .ticker-dot { width:3px; height:3px; border-radius:50%; background:var(--text3); flex-shrink:0; }

  /* BOTTOM ROW */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* REDDIT */
  .reddit-list { padding: 6px 0 4px; }
  .reddit-post { display:flex; flex-direction:column; border-bottom: 1px solid rgba(255,255,255,0.45); text-decoration:none; color:var(--text); transition: background 0.12s; }
  .reddit-post:last-child { border-bottom:none; }
  .reddit-post:hover { background: rgba(255,255,255,0.3); }
  .reddit-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
  .reddit-post-title { font-size:11px; font-weight:500; color:var(--text2); padding:7px 14px 8px; line-height:1.35; }

  /* SHIP */
  .ship-map-wrap { width:100%; height:300px; overflow:hidden; }
  .ship-map-wrap iframe { width:100%; height:100%; border:none; display:block; }

  /* UTILS */
  .loading { padding: 24px; text-align: center; font-size: 14px; color: var(--text3); }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(0,0,0,0.08); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #ff3b30; font-size: 13px; padding: 14px 18px; }

  /* RESPONSIVE iPhone 16e */
  @media (max-width: 430px) {
    .header { padding: 12px 16px; }
    #clock { font-size: 30px; letter-spacing: -1px; }
    .main { padding: 12px 12px 48px; gap: 10px; }
    .top-row, .news-row, .bottom-row { grid-template-columns: 1fr; }
    .weather-temp { font-size: 40px; }
    .weather-icon { font-size: 42px; }
    .weather-grid { grid-template-columns: repeat(2,1fr); }
    .ship-map-wrap { height: 220px; }
  }

  /* RESPONSIVE iPad Air M3 */
  @media (min-width: 768px) and (max-width: 1100px) {
    .main { padding: 24px 24px 60px; }
    #clock { font-size: 44px; }
    .weather-temp { font-size: 56px; }
    .weather-icon { font-size: 60px; }
    .ship-map-wrap { height: 340px; }
  }

  footer { text-align:center; font-size:11px; color:var(--text3); margin-top:4px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div id="clock">--:--</div>
    <div id="datestr"></div>
    <div id="location">Hannover</div>
  </div>
</header>

<div class="main">

  <!-- ROW 1: Player + Wetter -->
  <div class="top-row">

    <div class="card">
      <div class="card-header">
        <span class="card-label">NDR Info</span>
        <span class="card-meta" id="ndr-meta"></span>
      </div>
      <div id="ndr-player"><div class="loading"><span class="spinner"></span>Lade…</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-label">Wetter</span>
        <span class="card-meta" id="weather-date"></span>
      </div>
      <div id="weather-body"><div class="loading"><span class="spinner"></span>Lade Wetterdaten…</div></div>
    </div>

  </div>

  <!-- ROW 2: News1 + News2 -->
  <div class="news-row">

    <!-- News 1: Tagesschau + taz -->
    <div class="card">
      <div class="card-header"><span class="card-label">Nachrichten</span><span class="card-meta" id="news-updated"></span></div>
      <div class="ticker-section">
        <div class="ticker-label">Tagesschau</div>
        <div class="ticker-outer" id="to-tagesschau">
          <div class="ticker-track" id="tt-tagesschau"><div class="loading"><span class="spinner"></span></div></div>
        </div>
      </div>
      <div class="ticker-section">
        <div class="ticker-label">taz</div>
        <div class="ticker-outer" id="to-taz">
          <div class="ticker-track" id="tt-taz"><div class="loading"><span class="spinner"></span></div></div>
        </div>
      </div>
    </div>

    <!-- News 2: Bundestag -->
    <div class="card">
      <div class="card-header"><span class="card-label">Bundestag</span></div>
      <div class="ticker-section">
        <div class="ticker-label">Aktuelle Themen</div>
        <div class="ticker-outer" id="to-bt1">
          <div class="ticker-track" id="tt-bt1"><div class="loading"><span class="spinner"></span></div></div>
        </div>
      </div>
      <div class="ticker-section">
        <div class="ticker-label">Pressemitteilungen</div>
        <div class="ticker-outer" id="to-bt2">
          <div class="ticker-track" id="tt-bt2"><div class="loading"><span class="spinner"></span></div></div>
        </div>
      </div>
      <div class="ticker-section">
        <div class="ticker-label">Kurzmeldungen (hib)</div>
        <div class="ticker-outer" id="to-bt3">
          <div class="ticker-track" id="tt-bt3"><div class="loading"><span class="spinner"></span></div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ROW 3: Reddit + Schiffe -->
  <div class="bottom-row">

    <div class="card">
      <div class="card-header" style="padding-bottom:8px"><span class="card-label">Reddit · Bike</span></div>
      <div class="reddit-list" id="reddit-posts"><div class="loading"><span class="spinner"></span>Lade Posts…</div></div>
    </div>

    <div class="card">
      <div class="card-header" style="padding-bottom:0"><span class="card-label">Mittellandkanal</span></div>
      <div class="ship-map-wrap">
        <script>var width="100%";var height="100%";var latitude="52.4163";var longitude="9.7169";var zoom="15";var names=true;</script>
        <script src="https://www.vesselfinder.com/aismap.js"></script>
      </div>
    </div>

  </div>

  <footer>NDR Info · Tagesschau · taz · Bundestag · Reddit · Open-Meteo · VesselFinder</footer>
</div>

<script>
const DAYS = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const DAYS_SHORT = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
let audioEl = null, isPlaying = false;

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('datestr').textContent = `${DAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
updateClock(); setInterval(updateClock, 60000);

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

function renderAudio(data) {
  const el = document.getElementById('ndr-player');
  if (!data || !data.audio_url) { el.innerHTML = `<div class="error">Kein Clip verfügbar</div>`; return; }
  const pub = data.pub_date ? new Date(data.pub_date).toLocaleString('de-DE', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) + ' Uhr' : '';
  document.getElementById('ndr-meta').textContent = pub;
  el.innerHTML = `
    <div class="audio-wrap">
      <button class="play-btn" id="play-btn" onclick="togglePlay('${data.audio_url}')">
        <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div class="audio-info">
        <div class="audio-title">${data.title}</div>
        <div class="audio-meta">${data.duration ? data.duration + ' Min.' : ''}</div>
        <div class="progress-bar" id="prog-bar" onclick="seekAudio(event,this)">
          <div class="progress-fill" id="prog-fill"></div>
          <div class="progress-handle" id="prog-handle"></div>
        </div>
        <div class="audio-times"><span id="t-cur">0:00</span><span id="t-tot">--:--</span></div>
      </div>
    </div>`;
}

function togglePlay(url) {
  if (!audioEl) {
    audioEl = new Audio(url);
    audioEl.addEventListener('timeupdate', () => {
      const pct = audioEl.duration ? audioEl.currentTime/audioEl.duration*100 : 0;
      const f = document.getElementById('prog-fill');
      const h = document.getElementById('prog-handle');
      const c = document.getElementById('t-cur');
      if (f) f.style.width = pct+'%';
      if (h) h.style.left = pct+'%';
      if (c) c.textContent = formatTime(audioEl.currentTime);
    });
    audioEl.addEventListener('loadedmetadata', () => {
      const t = document.getElementById('t-tot');
      if (t) t.textContent = formatTime(audioEl.duration);
    });
    audioEl.addEventListener('ended', () => { isPlaying=false; updatePlayBtn(false); });
  }
  isPlaying = !isPlaying;
  isPlaying ? audioEl.play() : audioEl.pause();
  updatePlayBtn(isPlaying);
}

function updatePlayBtn(playing) {
  const icon = document.getElementById('play-icon');
  const btn = document.getElementById('play-btn');
  if (!icon) return;
  icon.innerHTML = playing ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>' : '<polygon points="6,3 20,12 6,21"/>';
  btn?.classList.toggle('playing', playing);
}

function seekAudio(e, bar) {
  if (!audioEl || !audioEl.duration) return;
  const r = bar.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - r.left) / r.width) * audioEl.duration;
}

// Weather
const W_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const W_DESC = {0:'Klarer Himmel',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bedeckt',45:'Neblig',48:'Gefrierender Nebel',51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Leichter Schneefall',73:'Schneefall',75:'Starker Schneefall',80:'Regenschauer',81:'Starke Schauer',82:'Heftige Schauer',95:'Gewitter',96:'Gewitter mit Hagel',99:'Schweres Gewitter'};

async function loadWeather() {
  try {
    const [wRes, aqRes] = await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast?latitude=52.3759&longitude=9.7320&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_hours,sunrise,sunset&timezone=auto&forecast_days=1'),
      fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=52.3759&longitude=9.7320&current=european_aqi&timezone=auto')
    ]);
    const d = await wRes.json();
    const aq = await aqRes.json();
    const c = d.current, dl = d.daily, now = new Date();
    const aqi = aq.current?.european_aqi ?? null;
    const aqiLabel = !aqi?'–':aqi<=20?'Sehr gut':aqi<=40?'Gut':aqi<=60?'Mäßig':aqi<=80?'Schlecht':'Sehr schlecht';
    const aqiColor = !aqi?'var(--text)':aqi<=40?'#34c759':aqi<=60?'#ff9500':'#ff3b30';
    const sunrise = new Date(dl.sunrise[0]).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const sunset = new Date(dl.sunset[0]).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const precip = dl.precipitation_sum[0];
    const precipH = dl.precipitation_hours[0];
    const precipText = precip > 0 ? `${precip} mm · ${precipH}h` : 'Kein Niederschlag';
    document.getElementById('weather-date').textContent = `${DAYS_SHORT[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]}`;
    document.getElementById('weather-body').innerHTML = `
      <div class="weather-main">
        <div class="weather-icon">${W_ICONS[c.weather_code]||'🌡️'}</div>
        <div>
          <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
          <div class="weather-desc">${W_DESC[c.weather_code]||''} · Gefühlt ${Math.round(c.apparent_temperature)}°</div>
        </div>
      </div>
      <div class="weather-grid">
        <div class="weather-stat"><div class="weather-stat-label">Hoch / Tief</div><div class="weather-stat-value">${Math.round(dl.temperature_2m_max[0])}° / ${Math.round(dl.temperature_2m_min[0])}°</div></div>
        <div class="weather-stat"><div class="weather-stat-label">Niederschlag</div><div class="weather-stat-value" style="font-size:13px;line-height:1.3">${precipText}</div></div>
        <div class="weather-stat"><div class="weather-stat-label">Luftqualität</div><div class="weather-stat-value" style="color:${aqiColor}">${aqiLabel}</div>${aqi?`<div class="weather-stat-sub">AQI ${aqi}</div>`:''}</div>
        <div class="weather-stat"><div class="weather-stat-label">Sonnenaufgang</div><div class="weather-stat-value">${sunrise}</div></div>
        <div class="weather-stat"><div class="weather-stat-label">Sonnenuntergang</div><div class="weather-stat-value">${sunset}</div></div>
        <div class="weather-stat"><div class="weather-stat-label">Wind / Feuchte</div><div class="weather-stat-value">${Math.round(c.wind_speed_10m)} km/h</div><div class="weather-stat-sub">${c.relative_humidity_2m}% Luftfeuchte</div></div>
      </div>`;
  } catch(e) {
    document.getElementById('weather-body').innerHTML = `<div class="error">Wetter nicht verfügbar</div>`;
  }
}

// Ticker builder
function buildTicker(items, trackId, outerId, sourceLabel) {
  const track = document.getElementById(trackId);
  const outer = document.getElementById(outerId);
  if (!items || !items.length) { track.innerHTML = `<span style="padding:0 20px;font-size:13px;color:var(--text3)">Keine Meldungen</span>`; return; }
  const html = items.map(i => `
    <a class="ticker-item" href="${i.link}" target="_blank" rel="noopener">
      ${sourceLabel ? `<span class="ticker-source">${sourceLabel}</span>` : ''}
      <span class="ticker-title">${i.title}</span>
      <span class="ticker-dot"></span>
    </a>`).join('');
  track.innerHTML = html + html;

  // Manual drag scroll
  let isDragging = false, startX = 0, scrollLeft = 0;
  outer.addEventListener('mousedown', e => { isDragging=true; startX=e.pageX-outer.offsetLeft; scrollLeft=outer.scrollLeft; track.classList.add('paused'); });
  outer.addEventListener('mouseleave', () => { if(isDragging){isDragging=false; track.classList.remove('paused');} });
  outer.addEventListener('mouseup', () => { isDragging=false; track.classList.remove('paused'); });
  outer.addEventListener('mousemove', e => { if(!isDragging)return; e.preventDefault(); outer.scrollLeft=scrollLeft-(e.pageX-outer.offsetLeft-startX); });
  outer.addEventListener('touchstart', ()=>track.classList.add('paused'),{passive:true});
  outer.addEventListener('touchend', ()=>setTimeout(()=>track.classList.remove('paused'),2000),{passive:true});
}

function renderReddit(items) {
  const el = document.getElementById('reddit-posts');
  if (!items?.length) { el.innerHTML = `<div class="error">Keine Posts verfügbar</div>`; return; }
  const withImg = items.filter(i => i.thumb);
  if (!withImg.length) { el.innerHTML = `<div class="error">Keine Posts mit Bildern</div>`; return; }
  el.innerHTML = withImg.map(i => `
    <a class="reddit-post" href="${i.link}" target="_blank" rel="noopener">
      <img class="reddit-thumb" src="${i.thumb}" alt="" onerror="this.parentElement.style.display='none'">
      <div class="reddit-post-title">${i.title}</div>
    </a>`).join('');
}

async function loadData() {
  try {
    const r = await fetch(`news.json?t=${Date.now()}`);
    if (!r.ok) throw new Error('news.json nicht gefunden');
    const data = await r.json();

    renderAudio(data.ndr_audio);

    buildTicker(data.tagesschau, 'tt-tagesschau', 'to-tagesschau', null);
    buildTicker(data.taz, 'tt-taz', 'to-taz', null);
    buildTicker(data.bt_themen, 'tt-bt1', 'to-bt1', null);
    buildTicker(data.bt_presse, 'tt-bt2', 'to-bt2', null);
    buildTicker(data.bt_hib, 'tt-bt3', 'to-bt3', null);

    renderReddit(data.reddit);

    const updated = new Date(r.headers.get('last-modified') || Date.now());
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('news-updated').textContent = `${pad(updated.getHours())}:${pad(updated.getMinutes())} Uhr`;
  } catch(e) {
    ['tt-tagesschau','tt-taz','tt-bt1','tt-bt2','tt-bt3','reddit-posts','ndr-player'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<div class="error">${e.message}</div>`;
    });
  }
}

loadWeather();
loadData();
</script>
