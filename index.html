<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morgen-Briefing · Hannover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --card2: #f2f2f7;
    --label: rgba(60,60,67,0.6);
    --text: #1c1c1e;
    --text2: rgba(60,60,67,0.6);
    --text3: rgba(60,60,67,0.3);
    --accent: #007aff;
    --border: rgba(60,60,67,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: rgba(255,255,255,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {}
  #clock {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
  }
  #datestr {
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
    margin-top: 3px;
    letter-spacing: 0.1px;
  }
  .header-right {
    text-align: right;
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .header-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
    margin-top: 2px;
  }

  /* LAYOUT */
  .main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 720px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text2);
  }
  .card-meta {
    font-size: 12px;
    font-weight: 400;
    color: var(--text3);
  }

  /* NDR AUDIO */
  .audio-wrap {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn:active { transform: scale(0.93); opacity: 0.85; }
  .play-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }
  .play-btn.playing svg { margin-left: 0; }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .audio-meta {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  .progress-handle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    left: 0%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .progress-bar:hover .progress-handle { opacity: 1; }
  .audio-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-top: 5px;
  }

  /* WETTER */
  .weather-main {
    padding: 20px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .weather-icon-wrap { font-size: 56px; line-height: 1; flex-shrink: 0; }
  .weather-temp-big {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
  }
  .weather-desc-line {
    font-size: 15px;
    font-weight: 400;
    color: var(--text2);
    margin-top: 4px;
  }
  .weather-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .weather-stat {
    background: var(--card);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .weather-stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .weather-stat-value {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .weather-stat-sub {
    font-size: 12px;
    color: var(--text2);
  }

  /* NEWS TICKER */
  .ticker-outer {
    overflow: hidden;
    padding: 16px 0;
    position: relative;
  }
  .ticker-outer::before, .ticker-outer::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 48px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker-outer::before { left: 0; background: linear-gradient(to right, var(--card), transparent); }
  .ticker-outer::after { right: 0; background: linear-gradient(to left, var(--card), transparent); }
  .ticker-track {
    display: flex;
    gap: 0;
    animation: ticker-scroll 60s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    padding: 0 32px;
    text-decoration: none;
    color: var(--text);
  }
  .ticker-source {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .ticker-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }
  .ticker-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  /* REDDIT */
  .reddit-list { padding: 8px 0; }
  .reddit-post {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 20px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .reddit-post:last-child { border-bottom: none; }
  .reddit-post:hover { background: var(--bg); }
  .reddit-thumb {
    width: 56px;
    height: 56px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg);
  }
  .reddit-post h3 {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
  }

  /* SHIP MAP */
  .ship-map-wrap {
    width: 100%;
    height: 320px;
    overflow: hidden;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .ship-map-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* MISC */
  .loading {
    padding: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--text3);
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #ff3b30; font-size: 13px; padding: 16px 20px; }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.03em;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div id="clock">--:--</div>
    <div id="datestr"></div>
  </div>
  <div class="header-right">
    <div class="header-title">Guten Morgen.</div>
    <div class="header-sub">Hannover</div>
  </div>
</header>

<div class="main">

  <!-- NDR -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">NDR Info</span>
      <span class="card-meta" id="ndr-meta"></span>
    </div>
    <div id="ndr-player"><div class="loading"><span class="spinner"></span>Lade Nachrichtenclip…</div></div>
  </div>

  <!-- Wetter -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">Wetter</span>
      <span class="card-meta" id="weather-date"></span>
    </div>
    <div id="weather-body"><div class="loading"><span class="spinner"></span>Lade Wetterdaten…</div></div>
  </div>

  <!-- News Ticker -->
  <div class="card">
    <div class="card-header" style="padding-bottom:0">
      <span class="card-label">Nachrichten</span>
      <span class="card-meta" id="news-updated"></span>
    </div>
    <div class="ticker-outer">
      <div class="ticker-track" id="ticker-track">
        <div class="loading"><span class="spinner"></span>Lade…</div>
      </div>
    </div>
  </div>

  <!-- Reddit + Schiffe -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header" style="padding-bottom:8px">
        <span class="card-label">Reddit · Bike</span>
      </div>
      <div class="reddit-list" id="reddit-posts">
        <div class="loading"><span class="spinner"></span>Lade Posts…</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header" style="padding-bottom:0">
        <span class="card-label">Mittellandkanal</span>
      </div>
      <div class="ship-map-wrap">
        <script>var width="100%";var height="320";var latitude="52.4163";var longitude="9.7169";var zoom="15";var names=true;</script>
        <script src="https://www.vesselfinder.com/aismap.js"></script>
      </div>
    </div>
  </div>

  <footer>NDR Info · Tagesschau · taz · Reddit · Open-Meteo · VesselFinder</footer>
</div>

<script>
const DAYS = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const DAYS_SHORT = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
let audioEl = null, isPlaying = false;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('datestr').textContent = `${DAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
updateClock(); setInterval(updateClock, 60000);

// Audio
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

function renderAudio(data) {
  const el = document.getElementById('ndr-player');
  if (!data || !data.audio_url) { el.innerHTML = `<div class="error">Kein Clip verfügbar</div>`; return; }
  const pub = data.pub_date ? new Date(data.pub_date).toLocaleString('de-DE', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) + ' Uhr' : '';
  document.getElementById('ndr-meta').textContent = pub;
  el.innerHTML = `
    <div class="audio-wrap">
      <button class="play-btn" id="play-btn" onclick="togglePlay('${data.audio_url}')">
        <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div class="audio-info">
        <div class="audio-title">${data.title}</div>
        <div class="audio-meta">${data.duration ? data.duration + ' Min.' : ''}</div>
        <div class="progress-bar" id="prog-bar" onclick="seekAudio(event,this)">
          <div class="progress-fill" id="prog-fill"></div>
          <div class="progress-handle" id="prog-handle"></div>
        </div>
        <div class="audio-times"><span id="t-cur">0:00</span><span id="t-tot">--:--</span></div>
      </div>
    </div>`;
}

function togglePlay(url) {
  if (!audioEl) {
    audioEl = new Audio(url);
    audioEl.addEventListener('timeupdate', () => {
      const pct = audioEl.duration ? audioEl.currentTime/audioEl.duration*100 : 0;
      const f = document.getElementById('prog-fill');
      const h = document.getElementById('prog-handle');
      const c = document.getElementById('t-cur');
      if (f) { f.style.width = pct+'%'; }
      if (h) { h.style.left = pct+'%'; }
      if (c) c.textContent = formatTime(audioEl.currentTime);
    });
    audioEl.addEventListener('loadedmetadata', () => {
      const t = document.getElementById('t-tot');
      if (t) t.textContent = formatTime(audioEl.duration);
    });
    audioEl.addEventListener('ended', () => { isPlaying=false; updatePlayBtn(false); });
  }
  isPlaying = !isPlaying;
  isPlaying ? audioEl.play() : audioEl.pause();
  updatePlayBtn(isPlaying);
}

function updatePlayBtn(playing) {
  const icon = document.getElementById('play-icon');
  const btn = document.getElementById('play-btn');
  if (!icon) return;
  icon.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="6,3 20,12 6,21"/>';
  btn?.classList.toggle('playing', playing);
}

function seekAudio(e, bar) {
  if (!audioEl || !audioEl.duration) return;
  const r = bar.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - r.left) / r.width) * audioEl.duration;
}

// Weather
const W_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const W_DESC = {0:'Klarer Himmel',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bedeckt',45:'Neblig',48:'Gefrierender Nebel',51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Leichter Schneefall',73:'Schneefall',75:'Starker Schneefall',80:'Regenschauer',81:'Starke Schauer',82:'Heftige Schauer',95:'Gewitter',96:'Gewitter mit Hagel',99:'Schweres Gewitter'};

async function loadWeather() {
  try {
    const [wRes, aqRes] = await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast?latitude=52.3759&longitude=9.7320&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,precipitation_hours,sunrise,sunset&hourly=precipitation&timezone=auto&forecast_days=1'),
      fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=52.3759&longitude=9.7320&current=european_aqi&timezone=auto')
    ]);
    const d = await wRes.json();
    const aq = await aqRes.json();
    const c = d.current, dl = d.daily;
    const now = new Date();

    // AQI label
    const aqi = aq.current?.european_aqi;
    const aqiLabel = aqi <= 20 ? 'Sehr gut' : aqi <= 40 ? 'Gut' : aqi <= 60 ? 'Mäßig' : aqi <= 80 ? 'Schlecht' : 'Sehr schlecht';
    const aqiColor = aqi <= 20 ? '#34c759' : aqi <= 40 ? '#34c759' : aqi <= 60 ? '#ff9500' : '#ff3b30';

    // Sunrise/sunset
    const sunrise = new Date(dl.sunrise[0]).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const sunset = new Date(dl.sunset[0]).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});

    // Precipitation
    const precip = dl.precipitation_sum[0];
    const precipHours = dl.precipitation_hours[0];
    const precipText = precip > 0 ? `${precip} mm · ${precipHours}h` : 'Kein Niederschlag';

    document.getElementById('weather-date').textContent = `${DAYS_SHORT[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]}`;

    document.getElementById('weather-body').innerHTML = `
      <div class="weather-main">
        <div class="weather-icon-wrap">${W_ICONS[c.weather_code]||'🌡️'}</div>
        <div>
          <div class="weather-temp-big">${Math.round(c.temperature_2m)}°</div>
          <div class="weather-desc-line">${W_DESC[c.weather_code]||''} · Gefühlt ${Math.round(c.apparent_temperature)}°</div>
        </div>
      </div>
      <div class="weather-grid">
        <div class="weather-stat">
          <div class="weather-stat-label">Hoch / Tief</div>
          <div class="weather-stat-value">${Math.round(dl.temperature_2m_max[0])}° / ${Math.round(dl.temperature_2m_min[0])}°</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Niederschlag</div>
          <div class="weather-stat-value" style="font-size:14px">${precipText}</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Luftqualität</div>
          <div class="weather-stat-value" style="color:${aqiColor}">${aqiLabel}</div>
          <div class="weather-stat-sub">AQI ${aqi}</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Sonnenaufgang</div>
          <div class="weather-stat-value">${sunrise}</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Sonnenuntergang</div>
          <div class="weather-stat-value">${sunset}</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Wind</div>
          <div class="weather-stat-value">${Math.round(c.wind_speed_10m)} km/h</div>
          <div class="weather-stat-sub">${c.relative_humidity_2m}% Feuchte</div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('weather-body').innerHTML = `<div class="error">Wetter nicht verfügbar</div>`;
  }
}

// Ticker
function buildTicker(tagesschau, taz) {
  const all = [
    ...tagesschau.map(i => ({...i, src:'Tagesschau'})),
    ...taz.map(i => ({...i, src:'taz'}))
  ];
  if (!all.length) {
    document.getElementById('ticker-track').innerHTML = `<span style="padding:0 20px;font-size:14px;color:var(--text3)">Keine Nachrichten verfügbar</span>`;
    return;
  }
  const items = all.map(i => `
    <a class="ticker-item" href="${i.link}" target="_blank" rel="noopener">
      <span class="ticker-source">${i.src}</span>
      <span class="ticker-title">${i.title}</span>
      <span class="ticker-dot"></span>
    </a>`).join('');
  // Double for seamless loop
  document.getElementById('ticker-track').innerHTML = items + items;
  // Adjust animation speed based on content width
  const track = document.getElementById('ticker-track');
  const totalWidth = track.scrollWidth / 2;
  const speed = Math.max(40, totalWidth / 8); // px per second
  track.style.animationDuration = `${speed}s`;
}

// Reddit
function renderReddit(items) {
  const el = document.getElementById('reddit-posts');
  if (!items?.length) { el.innerHTML = `<div class="error">Keine Posts verfügbar</div>`; return; }
  const withImg = items.filter(i => i.thumb);
  if (!withImg.length) { el.innerHTML = `<div class="error">Keine Posts mit Bildern</div>`; return; }
  el.innerHTML = withImg.map(i => `
    <a class="reddit-post" href="${i.link}" target="_blank" rel="noopener">
      <img class="reddit-thumb" src="${i.thumb}" alt="" onerror="this.parentElement.style.display='none'">
      <h3>${i.title}</h3>
    </a>`).join('');
}

// Load all data
async function loadData() {
  try {
    const r = await fetch(`news.json?t=${Date.now()}`);
    if (!r.ok) throw new Error('news.json nicht gefunden');
    const data = await r.json();
    renderAudio(data.ndr_audio);
    buildTicker(data.tagesschau || [], data.taz || []);
    renderReddit(data.reddit);
    const updated = new Date(r.headers.get('last-modified') || Date.now());
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('news-updated').textContent = `${pad(updated.getHours())}:${pad(updated.getMinutes())} Uhr`;
  } catch(e) {
    ['ticker-track','reddit-posts','ndr-player'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<div class="error">${e.message}</div>`;
    });
  }
}

loadWeather();
loadData();
</script>
</body>
</html>
